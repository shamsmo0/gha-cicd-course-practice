# This is the first real CI workflow in the course.
# It verifies a change by running tests on a fresh runner.
name: 02 CI Workflow

on:
  # Run automatically when app code, tests, or this workflow file changes.
 
  # Allow a safe manual run before students trigger it with a code change.
  workflow_dispatch:

jobs:
  run-tests:
    # The runner is the temporary machine that executes the steps below.
    runs-on: ubuntu-latest

    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        # Download the repository contents onto the runner.
        uses: actions/checkout@v6

      - name: Set up Python
        # Prepare Python on the runner. This does not change the student laptop.
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Show runner time
        run: date
      
      - name: Show Python version
        run: python --version
      
      - name: List repository files
        run: ls -la


      - name: Run tests
        # This is the key verification step in the CI workflow.
        run: python -m unittest discover -s tests -v
  
  build-package:
    # Use a fresh GitHub-hosted runner for the build.
    runs-on: ubuntu-latest
    needs: run-tests
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
        os: [ubuntu-latest]


    steps:
      - name: Check out repository
        # Get the repository files onto the runner.
        uses: actions/checkout@v6

      - name: Run tests
        # Build only after the verification step passes.
        run: python -m unittest discover -s tests -v
      
      - name: Create artifact file
        run: |
          echo "Build for Python ${{ matrix.python-version }}" > output.txt
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifact-${{ matrix.python-version }}
          path: output.txt


